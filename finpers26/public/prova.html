    <style>
      @keyframes fluid-blob {
        0%,
        100% {
          transform: translate(0, 0) scale(1);
        }
        33% {
          transform: translate(30px, -50px) scale(1.1);
        }
        66% {
          transform: translate(-20px, 20px) scale(0.9);
        }
      }
      .animate-fluid {
        animation: fluid-blob 15s infinite alternate ease-in-out;
      }
      .animate-fluid-delayed {
        animation: fluid-blob 18s infinite alternate-reverse ease-in-out;
      }
      .glass-panel {
        background: rgba(11, 19, 38, 0.4);
        backdrop-filter: blur(24px);
        -webkit-backdrop-filter: blur(24px);

        <div

        <!-- Interconnected Nodes Pattern Overlay -->

            <pattern

          <rect fill="url(#grid-nodes)" height="100%" width="100%"></rect>

      </div>
      <!-- Content Canvas -->

    <script>
      (function () {
        const canvas = document.getElementById("mouse-trail-canvas");
        const ctx = canvas.getContext("2d");
        const section = canvas.parentElement;
        let particles = [];

        function resize() {
          canvas.width = section.offsetWidth;
          canvas.height = section.offsetHeight;
        }

        window.addEventListener("resize", resize);
        resize();

        class Particle {
          constructor(x, y) {
            this.x = x;
            this.y = y;
            this.size = Math.random() * 3 + 1;
            this.speedX = Math.random() * 1 - 0.5;
            this.speedY = Math.random() * 1 - 0.5;
            this.color = "#7bd0ff";
            this.alpha = 1;
            this.decay = Math.random() * 0.02 + 0.015;
          }

          update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.alpha -= this.decay;
          }

          draw() {
            ctx.save();
            ctx.globalAlpha = this.alpha;
            ctx.shadowBlur = 10;
            ctx.shadowColor = this.color;
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
          }
        }

        section.addEventListener("mousemove", (e) => {
          const rect = section.getBoundingClientRect();
          const mouseX = e.clientX - rect.left;
          const mouseY = e.clientY - rect.top;

          for (let i = 0; i < 2; i++) {
            particles.push(new Particle(mouseX, mouseY));
          }
        });

        function animate() {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          for (let i = 0; i < particles.length; i++) {
            particles[i].update();
            particles[i].draw();
            if (particles[i].alpha <= 0) {
              particles.splice(i, 1);
              i--;
            }
          }
          requestAnimationFrame(animate);
        }
        animate();
      })();
    </script>
  </body>
