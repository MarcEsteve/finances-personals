<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Letras enjambre</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #ffffff00;
      cursor: crosshair;
    }

    canvas {
      display: block;
      background: #ffffff00;
    }

    .info {
      position: fixed;
      left: 16px;
      bottom: 12px;
      font-family: Arial, sans-serif;
      font-size: 10px;
      color: #882d5b;
      user-select: none;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="info">Mueve el ratón para que las letras lo sigan</div>

  <script>
    const canvas = document.getElementById("canvas");
    const ctx = canvas.getContext("2d");

    let w = canvas.width = window.innerWidth;
    let h = canvas.height = window.innerHeight;

    const WORD = "CLARIAH";
    const LETTER_POOL = "ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz";
    const PARTICLE_COUNT = 180;
    const FONT_SIZE = 12;
    const MOUSE_TRIGGER_RADIUS = 180;
    const CENTER_X = () => w / 2;
    const CENTER_Y = () => h / 2;

    const mouse = {
      x: -9999,
      y: -9999,
      active: false
    };

    const particles = [];
    let wordTargets = [];

    function resizeCanvas() {
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
      wordTargets = generateWordTargets(WORD);
    }

    window.addEventListener("resize", resizeCanvas);

    function randomChar() {
      return LETTER_POOL[Math.floor(Math.random() * LETTER_POOL.length)];
    }

    function rand(min, max) {
      return Math.random() * (max - min) + min;
    }

    function distance(ax, ay, bx, by) {
      const dx = bx - ax;
      const dy = by - ay;
      return Math.sqrt(dx * dx + dy * dy);
    }

    function generateWordTargets(word) {
      const off = document.createElement("canvas");
      const offCtx = off.getContext("2d");

      off.width = w;
      off.height = h;

      const bigFont = Math.max(80, Math.min(180, w * 0.12));
      offCtx.clearRect(0, 0, off.width, off.height);
      offCtx.fillStyle = "#000";
      offCtx.textAlign = "center";
      offCtx.textBaseline = "middle";
      offCtx.font = `900 ${bigFont}px Arial`;

      offCtx.fillText(word, w / 2, h / 2);

      const image = offCtx.getImageData(0, 0, w, h).data;
      const points = [];
      const gap = 10;

      for (let y = 0; y < h; y += gap) {
        for (let x = 0; x < w; x += gap) {
          const index = (y * w + x) * 4;
          const alpha = image[index + 3];
          if (alpha > 100) {
            points.push({ x, y });
          }
        }
      }

      return points;
    }

    function createParticles() {
      particles.length = 0;
      wordTargets = generateWordTargets(WORD);

      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const angle = Math.random() * Math.PI * 2;
        const speed = rand(0.2, 0.8);

        particles.push({
          x: rand(0, w),
          y: rand(0, h),
          vx: Math.cos(angle) * speed,
          vy: Math.sin(angle) * speed,
          ax: 0,
          ay: 0,
          char: randomChar(),
          size: rand(7, 10),
          phase: rand(0, Math.PI * 2),
          noiseSpeed: rand(0.005, 0.02),
          maxSpeed: rand(1.2, 2.2),
          targetIndex: i % Math.max(1, wordTargets.length)
        });
      }
    }

    function applySwarmMotion(p, time) {
      const a = Math.cos(time * p.noiseSpeed + p.phase) * 0.03;
      const b = Math.sin(time * p.noiseSpeed * 1.3 + p.phase) * 0.03;

      p.ax += a;
      p.ay += b;
    }

    function applyCenterSwarm(p) {
      const dx = CENTER_X() - p.x;
      const dy = CENTER_Y() - p.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;

      if (d > 140) {
        p.ax += (dx / d) * 0.01;
        p.ay += (dy / d) * 0.01;
      }
    }

    function applyParticleAttraction() {
      const neighborRadius = 80;
      const force = 0.0025;

      for (let i = 0; i < particles.length; i++) {
        for (let j = i + 1; j < particles.length; j++) {
          const p1 = particles[i];
          const p2 = particles[j];

          const dx = p2.x - p1.x;
          const dy = p2.y - p1.y;
          const d2 = dx * dx + dy * dy;

          if (d2 > 0 && d2 < neighborRadius * neighborRadius) {
            const d = Math.sqrt(d2);
            const f = (1 - d / neighborRadius) * force;

            const fx = (dx / d) * f;
            const fy = (dy / d) * f;

            p1.ax += fx;
            p1.ay += fy;
            p2.ax -= fx;
            p2.ay -= fy;
          }
        }
      }
    }

    function isMouseTriggeringWord() {
      return distance(mouse.x, mouse.y, CENTER_X(), CENTER_Y()) < MOUSE_TRIGGER_RADIUS;
    }

    function applyWordFormation(p, index) {
      if (!wordTargets.length) return;

      const target = wordTargets[index % wordTargets.length];
      const dx = target.x - p.x;
      const dy = target.y - p.y;

      p.ax += dx * 0.012;
      p.ay += dy * 0.012;
    }

    function applyMouseFollow(p) {
      const dx = mouse.x - p.x;
      const dy = mouse.y - p.y;
      const d = Math.sqrt(dx * dx + dy * dy) || 1;
      const followRadius = 320;

      if (d < followRadius) {
        const strength = (1 - d / followRadius) * 0.12;
        p.ax += (dx / d) * strength;
        p.ay += (dy / d) * strength;
      }
    }

    function limitSpeed(p) {
      const speed = Math.sqrt(p.vx * p.vx + p.vy * p.vy);
      if (speed > p.maxSpeed) {
        p.vx = (p.vx / speed) * p.maxSpeed;
        p.vy = (p.vy / speed) * p.maxSpeed;
      }
    }

    function update(time) {
      const formingWord = isMouseTriggeringWord();

      applyParticleAttraction();

      for (let i = 0; i < particles.length; i++) {
        const p = particles[i];
        p.ax = 0;
        p.ay = 0;

        applySwarmMotion(p, time);
        applyCenterSwarm(p);

        if (formingWord) {
          applyWordFormation(p, i);
        } else {
          const driftX = Math.sin(time * 0.001 + p.phase) * 0.02;
          const driftY = Math.cos(time * 0.0014 + p.phase) * 0.02;
          p.ax += driftX;
          p.ay += driftY;
        }

        if (mouse.active) {
          applyMouseFollow(p);
        }

        p.vx += p.ax;
        p.vy += p.ay;

        p.vx *= formingWord ? 0.90 : 0.97;
        p.vy *= formingWord ? 0.90 : 0.97;

        limitSpeed(p);

        p.x += p.vx;
        p.y += p.vy;

        if (p.x < -20) p.x = w + 20;
        if (p.x > w + 20) p.x = -20;
        if (p.y < -20) p.y = h + 20;
        if (p.y > h + 20) p.y = -20;
      }

      draw(formingWord);
      requestAnimationFrame(update);
    }

    function draw(formingWord) {
      ctx.clearRect(0, 0, w, h);

      ctx.fillStyle = "#882d5b";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";

      for (const p of particles) {
        ctx.font = `${p.size}px Arial`;
        ctx.fillText(p.char, p.x, p.y);
      }

      if (formingWord) {
        ctx.beginPath();
        ctx.arc(CENTER_X(), CENTER_Y(), MOUSE_TRIGGER_RADIUS, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(0,0,0,0.05)";
        ctx.stroke();
      }
    }

    window.addEventListener("mousemove", (e) => {
      mouse.x = e.clientX;
      mouse.y = e.clientY;
      mouse.active = true;
    });

    window.addEventListener("mouseleave", () => {
      mouse.x = -9999;
      mouse.y = -9999;
      mouse.active = false;
    });

    resizeCanvas();
    createParticles();
    requestAnimationFrame(update);
  </script>
</body>
</html>
